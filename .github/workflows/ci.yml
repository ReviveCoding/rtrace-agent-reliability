name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rtrace-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  PYTHONUTF8: "1"
  PYTHONHASHSEED: "0"
  MPLBACKEND: Agg
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  OPENBLAS_NUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"

jobs:
  test:
    name: test-py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]" && python -m pip check
      - name: Run tests, with coverage on the primary supported interpreter
        run: |
          if [ "${{ matrix.python-version }}" = "3.11" ]; then
            python -m pytest -p pytest_cov --cov=rtrace --cov-report=term-missing --cov-report=xml
          else
            python -m pytest
          fi
      - name: Upload primary Python coverage
        if: ${{ always() && matrix.python-version == '3.11' }}
        uses: actions/upload-artifact@v6
        with:
          name: rtrace-coverage-${{ github.sha }}
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14

  quality-package-smoke:
    name: lint-type-build-wheel-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install quality dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]" && python -m pip check
      - name: Lint and static type check
        run: |
          python -m ruff check src tests scripts
          python -m ruff format --check src tests scripts
          python -m mypy src/rtrace
      - name: Build fresh wheel and source distribution
        run: |
          rm -rf build dist wheel-artifacts .wheel-venv
          python -m build
      - name: Install wheel in a clean environment and run packaged smoke paths
        run: |
          python -m venv .wheel-venv
          .wheel-venv/bin/python -m pip install --upgrade pip
          WHEEL=$(find dist -maxdepth 1 -name '*.whl' -print -quit)
          test -n "$WHEEL"
          .wheel-venv/bin/python -m pip install "$WHEEL"
          .wheel-venv/bin/python -m pip check
          .wheel-venv/bin/rtrace validate-data --output wheel-artifacts/validate --seed 17 --config configs/ci_smoke.yaml
          .wheel-venv/bin/rtrace run-all --output wheel-artifacts/run --seed 17 --config configs/ci_smoke.yaml
          .wheel-venv/bin/python scripts/verify_output.py --output wheel-artifacts/run
      - name: Upload clean-wheel smoke evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: rtrace-wheel-smoke-${{ github.sha }}
          path: wheel-artifacts
          if-no-files-found: warn
          retention-days: 14

  mcp-adapter-smoke:
    name: optional-mcp-adapter-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install optional MCP adapter
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,mcp]" && python -m pip check
      - name: Register and execute FastMCP tool smoke
        run: python -m pytest tests/test_mcp_runtime_optional.py

  windows-powershell-smoke:
    name: windows-powershell-smoke
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Parse PowerShell scripts before execution
        shell: pwsh
        run: |
          foreach ($script in @("scripts/run_local.ps1", "scripts/run_gpu_local.ps1")) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $script), [ref]$tokens, [ref]$errors)
            if ($errors.Count -gt 0) { throw "PowerShell parse failed for ${script}: $($errors.Message -join '; ')" }
          }
      - name: Run documented Windows PowerShell local path
        shell: pwsh
        run: |
          ./scripts/run_local.ps1 -Mode run -OutputRoot artifacts/windows -Seed 17 -ConfigPath configs/ci_smoke.yaml -Overwrite
          if (-not (Test-Path artifacts/windows/run/reports/evaluation_report.md)) { throw "missing evaluation report" }
          & .\.venv\Scripts\python.exe scripts/verify_output.py --output artifacts/windows/run
      - name: Upload Windows smoke evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: rtrace-windows-smoke-${{ github.sha }}
          path: artifacts/windows
          if-no-files-found: warn
          retention-days: 14

  docker-smoke:
    name: docker-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build runtime image
        run: docker build --tag rtrace-agentic-evaluation:ci .
      - name: Run packaged container pipeline and extract evidence
        run: |
          set -euo pipefail
          trap 'docker rm -f rtrace-container >/dev/null 2>&1 || true' EXIT
          docker run --name rtrace-container rtrace-agentic-evaluation:ci run-all --output /app/artifacts/ci --seed 17 --config /app/configs/ci_smoke.yaml
          mkdir -p docker-artifacts
          docker cp rtrace-container:/app/artifacts/ci/. docker-artifacts
          python scripts/verify_output.py --output docker-artifacts
      - name: Upload Docker smoke evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: rtrace-docker-smoke-${{ github.sha }}
          path: docker-artifacts
          if-no-files-found: warn
          retention-days: 14
